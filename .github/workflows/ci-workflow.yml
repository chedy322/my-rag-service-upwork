name: CI CD DevSecOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  GitGuadian:
      runs-on: ubuntu-latest
      environment: Staging
      steps:
      - name: Checkout the code repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: GitGuardian scan
        uses: GitGuardian/ggshield/actions/secret@v1.48.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
  
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v2
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v2

  # build the image ,run tests then deploy
  build-and-scan:
    runs-on: ubuntu-latest
    environment: Staging
    needs: [GitGuadian, codeql]
    env:
      IMAGE: docker.io/${{ secrets.DOCKERUSERNAME }}/${{ github.repository }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: '20'
      - name: Install docker buildKit
        uses: docker/setup-buildx-action@v3
      
      - name: Login to docker 
        uses: docker/login-action@v3
        with: 
          username: ${{secrets.DOCKERUSERNAME}}
          password: ${{secrets.DOCKERPASSWORD}}

      - name: Build the image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha 
          cache-to: type=gha,mode=max 
          push: false

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v1
        with:
          image-ref: ${{env.IMAGE}}
          exit-code: 1
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push image to docker registry    
        run: docker push ${{env.IMAGE}}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    environment: Production
    env: 
      IMAGE: docker.io/${{ secrets.DOCKERUSERNAME.repository_owner }}/${{ github.repository }}:${{ github.sha }}
      PROD_IMAGE: docker.io/${{ secrets.DOCKERUSERNAME }}/${{ github.repository }}:prod
    steps:
      - name: Login to docker 
        uses: docker/login-action@v3
        with: 
          username: ${{secrets.DOCKERUSERNAME}}
          password: ${{secrets.DOCKERPASSWORD}}

      - name: Pull,Promote and Push the image 
        run: | 
          docker pull ${{env.IMAGE}}
          docker tag ${{env.IMAGE}} ${{env.PROD_IMAGE}}
          docker push ${{env.PROD_IMAGE}}

      - name: Deploy to Render via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

        run: |
          curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"clearCache\":true, \"dockerImage\":\"${{env.PROD_IMAGE}}\"}"
